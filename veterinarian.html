<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feronia | Veterinarian Clinical Suite</title>
  <meta name="description" content="Veterinarian clinical suite for Feronia Wildlife Facility Management System.">
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="theme-veterinarian">

  <div class="app-container">
    
    <!-- LEFT SIDEBAR PANEL -->
    <div id="sidebar-node" class="sidebar">
      <!-- Generated dynamically in app.js -->
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="main-content">
      
      <!-- TOP HEADER BAR -->
      <div class="header-bar">
        <div class="header-title-area">
          <h2 id="header-title-node">Dashboard</h2>
          <p id="header-desc-node">Overview of your facility operations</p>
        </div>

        <div id="header-controls-node" class="header-controls">
          <!-- Generated dynamically in app.js -->
        </div>
      </div>

      <!-- ACTIVE SUB-PAGE ELEMENT -->
      <div id="page-render-node" style="flex: 1;">
        <!-- Injected dynamically in app.js -->
      </div>
      
    </div>

  </div>

  <!-- RIGHT SLIDE-OUT DETAIL DRAWER -->
  <div id="drawer-backdrop" class="drawer-backdrop" onclick="closeDetailDrawer()">
    <div id="detail-drawer" class="detail-drawer" onclick="event.stopPropagation()">
      <!-- Injected dynamically in app.js depending on type -->
    </div>
  </div>

  <!-- MODALS -->
  
  <!-- 1. QR CODE SCANNER MODAL -->
  <div id="scanner-modal" class="modal-backdrop" style="display: none;">
    <div class="modal-container" style="max-width: 480px;">
      <div class="modal-header">
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="metric-icon-wrapper" style="color: var(--primary-dark); background: var(--primary-light); width: 32px; height: 32px;">
            <i data-lucide="qr-code"></i>
          </div>
          <h3 class="panel-title">QR Scanner Simulator</h3>
        </div>
        <button class="drawer-close" onclick="closeScannerModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-content">
        <div class="scanner-viewfinder">
          <div class="scanner-corner border-tl"></div>
          <div class="scanner-corner border-tr"></div>
          <div class="scanner-corner border-bl"></div>
          <div class="scanner-corner border-br"></div>
          <div class="scanner-sweep-line"></div>
          <div class="scanner-viewfinder-inner">
            <i data-lucide="qr-code" class="pulse-anim" style="width: 40px; height: 40px; color: #10b981; margin-bottom: 8px;"></i>
            <p>Simulating Camera Stream...</p>
          </div>
        </div>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px;">
          Select a mockup tag below to simulate scanning a cage sticker or breeding tag:
        </p>
        <div id="scanner-targets-list" class="scanner-targets-grid">
          <!-- Injected dynamically in app.js -->
        </div>
      </div>
      <div class="modal-footer" style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 0.7rem; color: var(--text-muted);"><i data-lucide="sparkles" style="width: 12px; height: 12px; color: var(--accent-gold);"></i> Test live data synchronization</span>
        <button class="btn btn-secondary btn-sm" onclick="closeScannerModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- 2. EDIT MEDICAL RECORD MODAL -->
  <div id="edit-record-modal" class="modal-backdrop" style="display: none;">
    <div class="modal-container" style="max-width: 500px;">
      <div class="modal-header">
        <h3 class="panel-title">Edit Medical Record</h3>
        <button class="drawer-close" onclick="closeEditRecordModal()"><i data-lucide="x"></i></button>
      </div>
      <form id="edit-record-form" onsubmit="handleRecordSubmit(event)">
        <div class="modal-content">
          <div class="details-grid">
            <div class="form-group">
              <label class="form-label">Weight (kg)</label>
              <input id="edit-weight" class="form-input" type="number" step="0.01" required>
            </div>
            <div class="form-group">
              <label class="form-label">Heart Rate (bpm)</label>
              <input id="edit-heart-rate" class="form-input" type="number" required>
            </div>
            <div class="form-group">
              <label class="form-label">Respiratory Rate (rpm)</label>
              <input id="edit-resp-rate" class="form-input" type="number" required>
            </div>
            <div class="form-group">
              <label class="form-label">Temperature (°C)</label>
              <input id="edit-temp" class="form-input" type="number" step="0.1" required>
            </div>
            <div class="form-group" style="grid-column: span 2;">
              <label class="form-label">Diagnosis</label>
              <input id="edit-diagnosis" class="form-input" type="text" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Medical Note</label>
            <textarea id="edit-note" class="form-textarea" rows="2" placeholder="Record symptoms or therapy progress..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeEditRecordModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 3. SCHEDULE NEW CHECKUP MODAL -->
  <div id="add-checkup-modal" class="modal-backdrop" style="display: none;">
    <div class="modal-container" style="max-width: 480px;">
      <div class="modal-header">
        <h3 class="panel-title">Schedule New Checkup</h3>
        <button class="drawer-close" onclick="closeAddCheckupModal()"><i data-lucide="x"></i></button>
      </div>
      <form id="add-checkup-form" onsubmit="handleCheckupSubmit(event)">
        <div class="modal-content">
          <div class="form-group">
            <label class="form-label">Select Patient</label>
            <select id="new-checkup-animal" class="form-select" required>
              <!-- Injected dynamically in app.js -->
            </select>
          </div>
          <div class="details-grid">
            <div class="form-group">
              <label class="form-label">Date</label>
              <input id="new-checkup-date" class="form-input" type="date" required>
            </div>
            <div class="form-group">
              <label class="form-label">Time</label>
              <input id="new-checkup-time" class="form-input" type="time" required>
            </div>
            <div class="form-group">
              <label class="form-label">Checkup Type</label>
              <select id="new-checkup-type" class="form-select" required>
                <option value="Health Check">Health Check</option>
                <option value="Follow-up">Follow-up</option>
                <option value="Treatment">Treatment</option>
                <option value="Lab Review">Lab Review</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Caretaker / Vet</label>
              <input id="new-checkup-vet" class="form-input" type="text" value="Dr. Maria Reyes" required>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeAddCheckupModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Schedule Appointment</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Main JavaScript App Code -->
  <script src="app.js"></script>
</body>
</html>
